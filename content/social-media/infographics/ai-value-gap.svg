<svg xmlns='http://www.w3.org/2000/svg' width='1080' height='1080' viewBox='0 0 1080 1080'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#ffffff'/>
      <stop offset='100%' style='stop-color:#f7fafc'/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width='1080' height='1080' fill='url(#bg)'/>
  
  <!-- Title -->
  <text x='540' y='80' text-anchor='middle' font-family='Arial, sans-serif' font-size='48' font-weight='bold' fill='#1a365d'>THE AI VALUE GAP</text>
  
  <!-- 88% -->
  <text x='540' y='280' text-anchor='middle' font-family='Arial, sans-serif' font-size='180' font-weight='bold' fill='#1a365d'>88%</text>
  <text x='540' y='340' text-anchor='middle' font-family='Arial, sans-serif' font-size='32' fill='#4a5568'>of enterprises adopted AI</text>
  
  <!-- Divider line -->
  <line x1='200' y1='400' x2='880' y2='400' stroke='#e2e8f0' stroke-width='3'/>
  
  <!-- Arrow -->
  <polygon points='540,420 520,460 560,460' fill='#d69e2e'/>
  
  <!-- 5-10% -->
  <text x='540' y='560' text-anchor='middle' font-family='Arial, sans-serif' font-size='100' font-weight='bold' fill='#d69e2e'>5-10%</text>
  <text x='540' y='630' text-anchor='middle' font-family='Arial, sans-serif' font-size='32' fill='#4a5568'>see significant ROI</text>
  
  <!-- Key insight -->
  <text x='540' y='750' text-anchor='middle' font-family='Arial, sans-serif' font-size='28' font-weight='bold' fill='#1a365d'>The gap is organizational, not technical</text>
  
  <!-- Bullet points -->
  <text x='540' y='820' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>• Executive sponsorship from day one</text>
  <text x='540' y='860' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>• Dedicated AI/ML infrastructure</text>
  <text x='540' y='900' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>• Ruthless use-case prioritization</text>
  
  <!-- Footer -->
  <text x='540' y='1040' text-anchor='middle' font-family='Arial, sans-serif' font-size='20' fill='#a0aec0'>#AI #EnterpriseAI #DataStrategy</text>
</svg>