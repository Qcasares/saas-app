<svg xmlns='http://www.w3.org/2000/svg' width='1080' height='1350' viewBox='0 0 1080 1350'>
  <defs>
    <linearGradient id='bg3' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#ffffff'/>
      <stop offset='100%' style='stop-color:#fff5f5'/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width='1080' height='1350' fill='url(#bg3)'/>
  
  <!-- Title -->
  <text x='540' y='60' text-anchor='middle' font-family='Arial, sans-serif' font-size='36' font-weight='bold' fill='#1a365d'>THE HIDDEN COST OF POOR DATA GOVERNANCE</text>
  
  <!-- Cost Header -->
  <text x='540' y='180' text-anchor='middle' font-family='Arial, sans-serif' font-size='140' font-weight='bold' fill='#e53e3e'>£12.8M</text>
  <text x='540' y='260' text-anchor='middle' font-family='Arial, sans-serif' font-size='28' fill='#4a5568'>average cost of governance failure</text>
  
  <!-- Risk 1: Data Lineage -->
  <rect x='80' y='320' width='920' height='280' rx='12' fill='white' stroke='#e2e8f0' stroke-width='2'/>
  <text x='120' y='380' font-family='Arial, sans-serif' font-size='28' font-weight='bold' fill='#dd6b20'>⚠️ DATA LINEAGE BLINDSPOTS</text>
  
  <text x='540' y='450' text-anchor='middle' font-family='Arial, sans-serif' font-size='72' font-weight='bold' fill='#dd6b20'>73%</text>
  <text x='540' y='510' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>can't identify all copies of sensitive data</text>
  
  <text x='540' y='560' text-anchor='middle' font-family='Arial, sans-serif' font-size='20' fill='#a0aec0'>You can't protect what you can't trace</text>
  
  <!-- Risk 2: Stale Classification -->
  <rect x='80' y='630' width='920' height='280' rx='12' fill='white' stroke='#e2e8f0' stroke-width='2'/>
  
  <text x='120' y='690' font-family='Arial, sans-serif' font-size='28' font-weight='bold' fill='#dd6b20'>⚠️ STALE CLASSIFICATION</text>
  
  <text x='540' y='760' text-anchor='middle' font-family='Arial, sans-serif' font-size='72' font-weight='bold' fill='#dd6b20'>61%</text>
  <text x='540' y='820' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>never reclassify existing data</text>
  
  <text x='540' y='870' text-anchor='middle' font-family='Arial, sans-serif' font-size='20' fill='#a0aec0'>Data sensitivity changes. Classifications don't.</text>
  
  <!-- Risk 3: Consent Debt -->
  <rect x='80' y='940' width='920' height='280' rx='12' fill='white' stroke='#e2e8f0' stroke-width='2'/>
  
  <text x='120' y='1000' font-family='Arial, sans-serif' font-size='28' font-weight='bold' fill='#dd6b20'>⚠️ CONSENT MANAGEMENT DEBT</text>
  
  <text x='540' y='1070' text-anchor='middle' font-family='Arial, sans-serif' font-size='72' font-weight='bold' fill='#dd6b20'>4+</text>
  <text x='540' y='1130' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' fill='#4a5568'>systems for consent records (average)</text>
  <text x='540' y='1180' text-anchor='middle' font-family='Arial, sans-serif' font-size='20' fill='#a0aec0'>Deletion requests become archaeological expeditions</text>
  
  <!-- Bottom insight -->
  <rect x='80' y='1250' width='920' height='70' rx='8' fill='#1a365d'/>
  <text x='540' y='1295' text-anchor='middle' font-family='Arial, sans-serif' font-size='28' font-weight='bold' fill='white'>Accountability > Security</text>
</svg>